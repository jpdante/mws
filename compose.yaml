/services:
  mywatchstate:
    image: mywatchstate
    build:
      context: .
      dockerfile: MyWatchState/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=mywatchstate;Username=postgres;Password=postgres
      # Point these at your external Keycloak instance:
      - Keycloak__Url=http://localhost:8080
      - Keycloak__Realm=mywatchstate
      - Keycloak__ClientId=mywatchstate-extension
      - Keycloak__AdminClientId=mywatchstate-backend
      - Keycloak__AdminClientSecret=change-me
    ports:
      - "5000:8080"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mywatchstate
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
