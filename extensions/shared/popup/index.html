<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>MyWatchState</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0d0d0d;
      --surface:    #161616;
      --border:     #252525;
      --text:       #efefef;
      --text-2:     #888;
      --text-3:     #4a4a4a;
      --accent:     #3b82f6;
      --success:    #22c55e;
      --error:      #f87171;
      --error-bg:   rgba(248, 113, 113, 0.1);
      --danger:     #7f1d1d;
      --danger-fg:  #fca5a5;
    }

    body {
      width: 300px;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
      line-height: 1.4;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 14px;
      border-bottom: 1px solid var(--border);
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo {
      width: 20px; height: 20px;
      border-radius: 5px;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 800;
      color: #fff;
      flex-shrink: 0;
      letter-spacing: -0.5px;
    }
    header h1 { font-size: 13px; font-weight: 600; }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--text-3);
      flex-shrink: 0;
      transition: background 0.3s, box-shadow 0.3s;
    }
    .status-dot.online {
      background: var(--success);
      box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.15);
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
    }
    .tab {
      flex: 1;
      padding: 10px 0;
      text-align: center;
      cursor: pointer;
      color: var(--text-2);
      background: none;
      border: none;
      font-size: 13px;
      font-weight: 500;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab:hover:not(.active) { color: var(--text); }
    .tab.active { color: var(--text); border-bottom-color: var(--accent); }

    /* ── Section ── */
    .section { padding: 14px; }

    /* ── Forms ── */
    label {
      display: block;
      margin-bottom: 4px;
      color: var(--text-2);
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    input[type="text"],
    input[type="email"],
    input[type="password"] {
      display: block;
      width: 100%;
      padding: 8px 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-size: 13px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input[type="text"]:focus,
    input[type="email"]:focus,
    input[type="password"]:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.12);
    }
    input.invalid { border-color: #7f1d1d; }
    input.invalid:focus { box-shadow: 0 0 0 3px rgba(248, 113, 113, 0.12); }
    input.valid   { border-color: #166534; }
    input.valid:focus { box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.1); }

    /* ── Field error ── */
    .field-error {
      display: block;
      font-size: 11px;
      color: var(--error);
      min-height: 16px;
      padding: 3px 2px 4px;
    }

    /* ── Buttons ── */
    .btn {
      display: block;
      width: 100%;
      padding: 9px 12px;
      border: none;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      margin-top: 8px;
      text-align: center;
    }
    .btn:active:not(:disabled) { transform: scale(0.98); }
    .btn:hover:not(:disabled) { opacity: 0.85; }
    .btn:disabled { opacity: 0.38; cursor: default; }
    .btn-primary   { background: var(--accent); color: #fff; }
    .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
    .btn-danger    { background: var(--danger); color: var(--danger-fg); }

    /* ── Link button ── */
    .link-btn {
      background: none;
      border: none;
      color: var(--text-2);
      font-size: 12px;
      cursor: pointer;
      padding: 6px 0 2px;
      display: block;
      width: 100%;
      text-align: center;
      transition: color 0.15s;
    }
    .link-btn:hover { color: var(--text); }
    .link-btn.muted { color: var(--text-3); font-size: 11px; }
    .link-btn.muted:hover { color: var(--text-2); }

    /* ── Feedback messages ── */
    .msg {
      font-size: 12px;
      margin-top: 8px;
      min-height: 16px;
      border-radius: 6px;
      padding: 7px 9px;
      line-height: 1.4;
    }
    .msg:empty { padding: 0; min-height: 0; margin-top: 0; }
    .msg.error   { color: var(--error);   background: var(--error-bg); }
    .msg.success { color: var(--success); background: rgba(34, 197, 94, 0.1); }
    .msg.info    { color: #60a5fa;        background: rgba(96, 165, 250, 0.1); }

    /* ── User panel ── */
    .user-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 10px;
    }
    .user-name  { font-weight: 600; font-size: 14px; }
    .user-email { color: var(--text-2); font-size: 11px; margin-top: 2px; }

    /* ── Sync count ── */
    .sync-count {
      font-size: 11px;
      color: var(--text-2);
      text-align: center;
      min-height: 14px;
      margin-bottom: 4px;
    }

    /* ── Settings accordion ── */
    details { border-top: 1px solid var(--border); }
    details summary {
      padding: 10px 14px;
      cursor: pointer;
      color: var(--text-2);
      font-size: 12px;
      user-select: none;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.15s;
    }
    details summary::-webkit-details-marker { display: none; }
    details summary::before { content: '⚙'; font-size: 13px; }
    details summary:hover { color: var(--text); }
    details[open] summary { color: var(--text); }
    .color-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .color-row label { margin: 0; flex: 1; }
    input[type="color"] {
      width: 36px; height: 26px;
      padding: 2px 3px;
      border: 1px solid var(--border);
      border-radius: 5px;
      background: var(--surface);
      cursor: pointer;
      flex-shrink: 0;
    }

    /* ── Delete warning ── */
    .delete-warning {
      font-size: 12px;
      color: var(--error);
      line-height: 1.5;
      background: var(--error-bg);
      border-radius: 7px;
      padding: 10px;
      margin-bottom: 10px;
    }

    /* ── Utils ── */
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <header>
    <div class="header-left">
      <div class="logo">M</div>
      <h1>MyWatchState</h1>
    </div>
    <div class="status-dot" id="dot"></div>
  </header>

  <!-- ── Logged-out: Sign In / Register / Forgot tabs ── -->
  <div id="auth-section">
    <div class="tabs" id="auth-tabs">
      <button class="tab active" id="tab-login">Sign In</button>
      <button class="tab"        id="tab-register">Register</button>
    </div>

    <!-- Sign In panel -->
    <div class="section" id="panel-login">
      <button class="btn btn-primary" id="btn-login">Sign In</button>
      <div class="msg error" id="login-error"></div>
      <button class="link-btn" id="btn-forgot-link">Forgot password?</button>
    </div>

    <!-- Register panel -->
    <div class="section hidden" id="panel-register">
      <label for="reg-username">Username</label>
      <input type="text"     id="reg-username" autocomplete="username" placeholder="at least 3 characters">
      <span class="field-error" id="err-username"></span>

      <label for="reg-email">Email</label>
      <input type="email"    id="reg-email"    autocomplete="email">
      <span class="field-error" id="err-email"></span>

      <label for="reg-password">Password</label>
      <input type="password" id="reg-password" autocomplete="new-password" placeholder="at least 8 characters">
      <span class="field-error" id="err-password"></span>

      <label for="reg-password-confirm">Confirm Password</label>
      <input type="password" id="reg-password-confirm" autocomplete="new-password">
      <span class="field-error" id="err-password-confirm"></span>

      <button class="btn btn-primary" id="btn-register" disabled>Create Account</button>
      <div class="msg" id="register-msg"></div>
    </div>

    <!-- Forgot password panel (replaces tabs when active) -->
    <div class="section hidden" id="panel-forgot">
      <label for="forgot-email">Email address</label>
      <input type="email" id="forgot-email" autocomplete="email" placeholder="your@email.com">

      <button class="btn btn-primary" id="btn-forgot">Send Reset Link</button>
      <div class="msg" id="forgot-msg"></div>
      <button class="link-btn" id="btn-back-login">← Back to sign in</button>
    </div>
  </div>

  <!-- ── Logged-in ── -->
  <div id="user-section" class="hidden">

    <!-- Main user panel -->
    <div class="section" id="panel-user">
      <div class="user-card">
        <div class="user-name" id="user-display">—</div>
        <div class="user-email" id="user-email"></div>
      </div>
      <div class="sync-count" id="sync-count"></div>
      <button class="btn btn-secondary" id="btn-sync" disabled>Sync Now</button>
      <button class="btn btn-danger"    id="btn-logout">Sign Out</button>
      <button class="link-btn muted"    id="btn-delete-account-link">Delete account</button>
    </div>

    <!-- Delete confirmation panel -->
    <div class="section hidden" id="panel-delete">
      <p class="delete-warning" id="delete-warning"></p>
      <button class="btn btn-danger" id="btn-confirm-delete">Permanently Delete My Account</button>
      <div class="msg" id="delete-msg"></div>
      <button class="link-btn" id="btn-cancel-delete">← Cancel</button>
    </div>

  </div>

  <!-- ── Settings (always visible) ── -->
  <details>
    <summary>Settings</summary>
    <div class="section">
      <div class="color-row">
        <label for="cfg-bar-color">Progress bar color</label>
        <input type="color" id="cfg-bar-color" value="#3b82f6">
      </div>
    </div>
  </details>

  <script src="index.js" type="module"></script>
</body>
</html>
